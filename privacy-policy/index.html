<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting…</title>
  <!-- Primary redirect: fires immediately -->
  <meta http-equiv="refresh" content="0; url=https://camera-dictionary-support.my.canva.site/privacy-policy">
  <link rel="canonical" href="https://camera-dictionary-support.my.canva.site/privacy-policy">
  <script>
    // JS fallback in case meta-refresh is blocked
    window.location.replace("https://camera-dictionary-support.my.canva.site/privacy-policy");
  </script>
</head>
<body>
  <!-- Manual fallback if both above fail -->
  <p>If you are not redirected automatically,
     <a href="https://camera-dictionary-support.my.canva.site/privacy-policy">click here</a>.</p>
</body>
</html>
